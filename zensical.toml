# Zensical Configuration
# https://zensical.org/docs/setup/basics/

[project]
site_name = "Terraform Branch Deploy"
site_description = "Terraform integrated into the Branch Deploy operating model"
site_url = "https://scarowar.github.io/terraform-branch-deploy/"
repo_url = "https://github.com/scarowar/terraform-branch-deploy"
repo_name = "scarowar/terraform-branch-deploy"
edit_uri = "edit/main/docs/"

nav = [
    {"Home" = "index.md"},
    {"Quickstart" = "quickstart.md"},
    {"Upgrading" = "upgrading.md"},
    {"How It Works" = "concepts/modes.md"},
    {"Configuration" = "configuration/index.md"},
    {"Commands" = "reference/commands.md"},
    {"Reference" = [
        {"Inputs" = "reference/inputs.md"},
        {"Outputs" = "reference/outputs.md"},
        {"Environment Variables" = "reference/environment-vars.md"}
    ]},
    {"Security" = "security.md"},
    {"Troubleshooting" = "troubleshooting.md"}
]

[project.theme]
favicon = "assets/git-pull-request.png"
font.text = "IBM Plex Sans"
font.code = "IBM Plex Mono"
features = [
    "navigation.tabs",
    "navigation.sections",
    "navigation.indexes",
    "navigation.path",
    "navigation.top",
    "navigation.footer",
    "content.code.copy",
    "content.code.annotate",
    "content.tabs.link",
    "content.action.edit",
    "content.action.view",
    "content.footnote.tooltips",
    "search.highlight",
    "search.suggest",
    "toc.follow"
]

[project.theme.icon]
logo = "lucide/git-pull-request"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
primary = "deep purple"
accent = "deep purple"

[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "deep purple"
accent = "deep purple"

[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to light mode"

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]
base_path = ["docs/includes"]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
