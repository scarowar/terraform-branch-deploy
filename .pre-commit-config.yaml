ci:
  autofix_commit_msg: "style: apply pre-commit fixes"
  autoupdate_commit_msg: "chore: update pre-commit hooks"
  autoupdate_schedule: weekly
  skip:
    - actionlint
    - bandit
    - gitlint
    - gitleaks
    - mypy
    - pip-audit
    - semgrep
    - zizmor

# See https://pre-commit.com for more information
repos:
  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  # Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0
          - typer>=0.9
          - rich>=13.0
          - types-PyYAML>=6.0
        args: [--ignore-missing-imports]

  # Python security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: "1.9.4"
    hooks:
      - id: bandit
        args: [-r, src/]
        exclude: tests/

  # Secret detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # GitHub Actions linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Commit message linting
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint

  # Deterministic security gates backed by uv.lock
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        entry: bash -c 'uv export --quiet --frozen --all-groups --no-emit-project --no-editable --no-hashes --output-file /tmp/tfbd-pip-audit-requirements.txt && uv run pip-audit --strict -r /tmp/tfbd-pip-audit-requirements.txt'
        language: system
        pass_filenames: false

      - id: semgrep
        name: semgrep
        entry: uv run semgrep scan --config .semgrep.yml --error --metrics=off --disable-version-check .
        language: system
        pass_filenames: false

      - id: zizmor
        name: zizmor
        entry: uv run zizmor --offline .
        language: system
        pass_filenames: false
