name: terraform-branch-deploy
description: Terraform integrated into the Branch Deploy operating model. Plan, review, and apply infrastructure changes within Pull Requests to ensure the main branch remains stable.

author: Sourab Kanthavar <@scarowar>

branding:
  icon: git-pull-request
  color: purple

inputs:
  # === MODE SELECTION ===
  mode:
    description: |
      trigger = Parse command via branch-deploy, export TF_BD_* to GITHUB_ENV, STOP
      execute = Run terraform with lifecycle completion (reads TF_BD_* from GITHUB_ENV)

      Use both modes as CONDITIONAL STEPS in a SINGLE JOB:
      - Trigger mode exports env vars
      - Custom steps (credentials) can access env vars
      - Execute mode picks up env vars automatically
    required: true

  # === REQUIRED ===
  github-token:
    description: "GitHub token with Branch Deploy permissions: pull-requests:write, deployments:write, contents:write, checks:read, statuses:read, actions:read"
    required: true

  # === TF-BRANCH-DEPLOY SPECIFIC ===
  config-path:
    description: "Path to .tf-branch-deploy.yml"
    default: ".tf-branch-deploy.yml"
  terraform-version:
    description: "Terraform version to install"
    default: "latest"
  dry-run:
    description: "Print commands without running"
    default: "false"
  plan-retention-days:
    description: "Days to keep saved plan artifacts before they expire (1-90, capped by the repository's artifact retention setting)"
    default: "7"

  # === BRANCH-DEPLOY PASSTHROUGH (trigger mode only) ===
  trigger:
    description: "Deploy command trigger"
    default: ".apply"
  noop-trigger:
    description: "Plan command trigger"
    default: ".plan"
  lock-trigger:
    description: "Lock command trigger"
    default: ".lock"
  unlock-trigger:
    description: "Unlock command trigger"
    default: ".unlock"
  help-trigger:
    description: "Help command trigger"
    default: ".help"
  lock-info-alias:
    description: "Lock info alias"
    default: ".wcid"
  param-separator:
    description: "Parameter separator in commands"
    default: "|"
  environment-targets:
    description: "Comma-separated environments (auto-detected from config if empty)"
    default: ""
  production-environments:
    description: "Comma-separated production environments"
    default: ""
  environment-urls:
    description: "Environment URLs mapping"
    default: ""
  draft-permitted-targets:
    description: "Environments allowing draft PR deployments"
    default: ""
  stable-branch:
    description: "Stable branch for rollbacks"
    default: "main"
  update-branch:
    description: "How to handle outdated branches: disabled|warn|force"
    default: "warn"
  outdated-mode:
    description: "How to handle outdated branches"
    default: "strict"
  allow-sha-deployments:
    description: "Allow deployments by SHA"
    default: "false"
  enforced-deployment-order:
    description: "Required deployment order"
    default: ""
  checks:
    description: "Which checks must pass before deployment"
    default: "all"
  ignored-checks:
    description: "Checks to ignore"
    default: ""
  skip-ci:
    description: "CI pattern to skip"
    default: ""
  skip-reviews:
    description: "Skip PR review requirement"
    default: ""
  required-contexts:
    description: "Required status contexts"
    default: ""
  permissions:
    description: "Required permissions"
    default: "write,admin"
  admins:
    description: "Admin users/teams"
    default: "false"
  admins-pat:
    description: "Admin PAT for checks"
    default: "false"
  commit-verification:
    description: "Require verified commits"
    default: "false"
  disable-naked-commands:
    description: "Require 'to <env>' in commands"
    default: "false"
  allow-non-default-target-branch:
    description: "Allow non-default target branches"
    default: "false"
  deployment-confirmation:
    description: "Require deployment confirmation"
    default: "false"
  deployment-confirmation-timeout:
    description: "Confirmation timeout seconds"
    default: "300"
  global-lock-flag:
    description: "Global lock flag"
    default: "--global"
  sticky-locks:
    description: "Keep locks after deployment"
    default: "false"
  sticky-locks-for-noop:
    description: "Keep locks for noop"
    default: "false"
  use-security-warnings:
    description: "Show security warnings"
    default: "true"
  reaction:
    description: "Initial reaction to command"
    default: "eyes"

outputs:
  # === STATE (from trigger mode) ===
  continue:
    description: "'true' if deployment should proceed"
    value: ${{ steps.branch-deploy.outputs.continue }}
  triggered:
    description: "'true' if command was detected"
    value: ${{ steps.branch-deploy.outputs.triggered }}
  environment:
    description: "Target environment"
    value: ${{ steps.branch-deploy.outputs.environment }}
  operation:
    description: "plan, apply, or rollback"
    value: ${{ steps.derive-operation.outputs.operation }}
  is-rollback:
    description: "'true' if rollback operation"
    value: ${{ steps.derive-operation.outputs.is_rollback }}
  sha:
    description: "Commit SHA to deploy"
    value: ${{ steps.branch-deploy.outputs.sha }}
  ref:
    description: "Branch ref to checkout (stable branch for rollbacks)"
    value: ${{ steps.branch-deploy.outputs.ref }}
  noop:
    description: "'true' for plan operations"
    value: ${{ steps.branch-deploy.outputs.noop }}
  actor:
    description: "User who triggered deployment"
    value: ${{ steps.branch-deploy.outputs.actor }}
  params:
    description: "Raw parameters from command"
    value: ${{ steps.branch-deploy.outputs.params }}
  comment-id:
    description: "Triggering comment ID"
    value: ${{ steps.branch-deploy.outputs.comment_id }}
  deployment-id:
    description: "GitHub deployment ID"
    value: ${{ steps.branch-deploy.outputs.deployment_id }}
  initial-reaction-id:
    description: "Initial reaction ID for cleanup"
    value: ${{ steps.branch-deploy.outputs.initial_reaction_id }}
  type:
    description: "Command type (deploy, lock, unlock, etc.)"
    value: ${{ steps.branch-deploy.outputs.type }}
  issue-number:
    description: "PR/Issue number"
    value: ${{ steps.branch-deploy.outputs.issue_number }}

  # Terraform-specific (from execute mode)
  working-directory:
    description: "Terraform working directory"
    value: ${{ steps.tf-execute.outputs.working_directory }}
  var-files:
    description: "JSON array of var files"
    value: ${{ steps.tf-execute.outputs.var_files }}
  is-production:
    description: "'true' if production environment"
    value: ${{ steps.tf-execute.outputs.is_production }}
  plan-file:
    description: "Path to plan file (after plan)"
    value: ${{ steps.tf-execute.outputs.plan_file }}
  plan-checksum:
    description: "SHA256 of plan file"
    value: ${{ steps.tf-execute.outputs.plan_checksum }}
  has-changes:
    description: "'true' if plan has changes"
    value: ${{ steps.tf-execute.outputs.has_changes }}

runs:
  using: composite
  steps:
    # ╔══════════════════════════════════════════════════════════════════════════╗
    # ║                              SETUP (both modes)                          ║
    # ╚══════════════════════════════════════════════════════════════════════════╝
    - name: Verify Python Requirements
      shell: bash
      run: |
        set +e
        if ! command -v python3 &> /dev/null; then
          echo "::error::Python 3 is not installed or not in PATH"
          exit 1
        fi
        # Enforce version requirement from pyproject.toml
        python3 - <<'EOF'
        import sys
        if sys.version_info < (3, 12):
            print("::error::tf-branch-deploy requires Python 3.12+")
            print(f"::error::Current version: {sys.version.split()[0]}")
            sys.exit(1)
        print(f"✅ Python {sys.version.split()[0]}")
        EOF

    - name: Check uv
      id: check-uv
      shell: bash
      env:
        TFBD_UV_VERSION: "0.11.11"
      run: |
        set -euo pipefail

        needs_setup="true"
        if command -v uv >/dev/null 2>&1; then
          installed_version="$(uv --version | awk '{print $2}')"
          if [[ "${installed_version}" == "${TFBD_UV_VERSION}" ]]; then
            needs_setup="false"
            echo "Using preinstalled uv ${installed_version}"
          else
            echo "Preinstalled uv ${installed_version} does not match required ${TFBD_UV_VERSION}"
          fi
        else
          echo "uv is not installed; installing ${TFBD_UV_VERSION}"
        fi

        echo "needs-setup=${needs_setup}" >> "${GITHUB_OUTPUT}"

    - name: Setup uv
      if: steps.check-uv.outputs.needs-setup == 'true'
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: "0.11.11"
        working-directory: ${{ github.action_path }}
        github-token: ${{ github.server_url == 'https://github.com' && inputs.github-token || '' }}
        # GitHub made the Actions cache read-only for untrusted triggers
        # (2026-06-26); a cache save on issue_comment runs is denied and
        # emits a warning annotation on every deploy. Cache restore stays
        # enabled - reads are still permitted on untrusted triggers.
        save-cache: ${{ github.event_name != 'issue_comment' && github.event_name != 'pull_request_target' }}

    - name: Install tf-branch-deploy
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        TFBD_VENV: ${{ runner.temp }}/tf-bd-venv
      run: |
        uv venv --clear "${TFBD_VENV}"
        UV_PROJECT_ENVIRONMENT="${TFBD_VENV}" \
          uv sync --frozen --no-dev --project "${ACTION_PATH}"

    - name: Check Terraform
      id: check-terraform
      if: inputs.mode == 'execute'
      shell: bash
      env:
        INPUT_TERRAFORM_VERSION: ${{ inputs.terraform-version }}
      run: |
        set -euo pipefail

        needs_setup="true"
        requested="${INPUT_TERRAFORM_VERSION#v}"

        if [[ "${INPUT_TERRAFORM_VERSION}" != "latest" ]] \
          && [[ "${INPUT_TERRAFORM_VERSION}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]] \
          && command -v terraform >/dev/null 2>&1; then
          installed="$(
            terraform version -json 2>/dev/null \
              | python3 -c 'import json, sys; print(json.load(sys.stdin).get("terraform_version", ""))' \
              2>/dev/null || true
          )"
          if [[ "${installed}" == "${requested}" ]]; then
            needs_setup="false"
            echo "Using preinstalled Terraform ${installed}"
          else
            echo "Preinstalled Terraform ${installed:-unknown} does not match requested ${requested}"
          fi
        else
          echo "Terraform setup required for requested version '${INPUT_TERRAFORM_VERSION}'"
        fi

        echo "needs-setup=${needs_setup}" >> "${GITHUB_OUTPUT}"

    - name: Setup Terraform
      if: inputs.mode == 'execute' && steps.check-terraform.outputs.needs-setup == 'true'
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false

    - name: Setup tfcmt
      if: inputs.mode == 'execute'
      shell: bash
      env:
        TFCMT_VERSION: "v4.14.0"
        TFCMT_SHA256: "bf0c82a40839647b20629289c9f72faa6dee931f45db26842e0818192c706309"
        TFBD_TOOL_DIR: ${{ runner.temp }}/tfbd-tools/bin
        TFCMT_ARCHIVE: ${{ runner.temp }}/tfcmt.tar.gz
      run: |
        set -euo pipefail

        if command -v tfcmt >/dev/null 2>&1; then
          echo "Using preinstalled tfcmt: $(command -v tfcmt)"
          exit 0
        fi

        mkdir -p "${TFBD_TOOL_DIR}"
        TFCMT_URL="https://github.com/suzuki-shunsuke/tfcmt/releases/download/${TFCMT_VERSION}/tfcmt_linux_amd64.tar.gz"

        if ! curl --fail --silent --show-error --location --retry 3 --retry-delay 2 --retry-all-errors \
          "${TFCMT_URL}" -o "${TFCMT_ARCHIVE}"; then
          echo "::warning::Could not download tfcmt. Terraform will run without tfcmt PR comments."
          exit 0
        fi

        if ! printf '%s  %s\n' "${TFCMT_SHA256}" "${TFCMT_ARCHIVE}" | sha256sum -c --strict -; then
          rm -f "${TFCMT_ARCHIVE}"
          echo "::warning::Downloaded tfcmt archive failed checksum verification. Terraform will run without tfcmt PR comments."
          exit 0
        fi

        tar xz -C "${TFBD_TOOL_DIR}" tfcmt < "${TFCMT_ARCHIVE}"
        chmod +x "${TFBD_TOOL_DIR}/tfcmt"
        rm -f "${TFCMT_ARCHIVE}"
        "${TFBD_TOOL_DIR}/tfcmt" --version

    # ╔══════════════════════════════════════════════════════════════════════════╗
    # ║                           TRIGGER MODE                                   ║
    # ║   Parse command → Export TF_BD_* env vars → STOP (no terraform)          ║
    # ╚══════════════════════════════════════════════════════════════════════════╝
    - name: "[Trigger] Detect Environments from Config"
      id: detect-envs
      if: inputs.mode == 'trigger'
      shell: bash
      env:
        INPUT_ENVIRONMENT_TARGETS: ${{ inputs.environment-targets }}
        INPUT_PRODUCTION_ENVIRONMENTS: ${{ inputs.production-environments }}
        INPUT_CONFIG_PATH: ${{ inputs.config-path }}
        TFBD_BIN: ${{ runner.temp }}/tf-bd-venv/bin/tf-branch-deploy
      run: |
        set -euo pipefail

        write_output() {
          local name="$1"
          local value="${2-}"
          local delimiter
          delimiter="TFBD_${name}_$(date +%s%N)_${RANDOM}"
          while [[ "$value" == *"$delimiter"* ]]; do
            delimiter="TFBD_${name}_$(date +%s%N)_${RANDOM}"
          done
          {
            printf '%s<<%s\n' "$name" "$delimiter"
            printf '%s\n' "$value"
            printf '%s\n' "$delimiter"
          } >> "$GITHUB_OUTPUT"
        }

        if [ -n "$INPUT_ENVIRONMENT_TARGETS" ]; then
          default_env="${INPUT_ENVIRONMENT_TARGETS%%,*}"
          write_output "targets" "$INPUT_ENVIRONMENT_TARGETS"
          write_output "default" "$default_env"
          write_output "production" "$INPUT_PRODUCTION_ENVIRONMENTS"
        else
          config_path="$INPUT_CONFIG_PATH"
          if [ ! -f "$config_path" ]; then
            echo "::error::Config file '${config_path}' not found. Set config-path or environment-targets."
            exit 1
          fi

          targets=$("$TFBD_BIN" environments --config "$config_path")
          default=$("$TFBD_BIN" get-config default-environment --config "$config_path")
          production=$("$TFBD_BIN" get-config production-environments --config "$config_path")

          if [ -z "$targets" ] || [ -z "$default" ]; then
            echo "::error::.tf-branch-deploy.yml must define at least one environment and default-environment."
            exit 1
          fi
          write_output "targets" "$targets"
          write_output "default" "$default"
          write_output "production" "$production"
        fi

    - name: "[Trigger] IssueOps Command Dispatcher"
      id: branch-deploy
      if: inputs.mode == 'trigger'
      uses: github/branch-deploy@de4d10ee17c3117a2076aff489ba03fadf225f35 # v11.1.5
      with:
        github_token: ${{ inputs.github-token }}
        # CRITICAL: We handle lifecycle completion in execute mode
        skip_completing: "true"
        trigger: ${{ inputs.trigger }}
        noop_trigger: ${{ inputs.noop-trigger }}
        lock_trigger: ${{ inputs.lock-trigger }}
        unlock_trigger: ${{ inputs.unlock-trigger }}
        help_trigger: ${{ inputs.help-trigger }}
        lock_info_alias: ${{ inputs.lock-info-alias }}
        param_separator: ${{ inputs.param-separator }}
        environment: ${{ steps.detect-envs.outputs.default }}
        environment_targets: ${{ steps.detect-envs.outputs.targets }}
        production_environments: ${{ steps.detect-envs.outputs.production }}
        environment_urls: ${{ inputs.environment-urls }}
        draft_permitted_targets: ${{ inputs.draft-permitted-targets }}
        stable_branch: ${{ inputs.stable-branch }}
        update_branch: ${{ inputs.update-branch }}
        outdated_mode: ${{ inputs.outdated-mode }}
        allow_sha_deployments: ${{ inputs.allow-sha-deployments }}
        enforced_deployment_order: ${{ inputs.enforced-deployment-order }}
        checks: ${{ inputs.checks }}
        ignored_checks: ${{ inputs.ignored-checks }}
        skip_ci: ${{ inputs.skip-ci }}
        skip_reviews: ${{ inputs.skip-reviews }}
        required_contexts: ${{ inputs.required-contexts }}
        permissions: ${{ inputs.permissions }}
        admins: ${{ inputs.admins }}
        admins_pat: ${{ inputs.admins-pat }}
        commit_verification: ${{ inputs.commit-verification }}
        disable_naked_commands: ${{ inputs.disable-naked-commands }}
        # Terraform Branch Deploy does not support forked PR execution yet.
        # Fork-aware checkout and lifecycle handling will be added only with
        # explicit tests for Branch Deploy's fork outputs.
        allow_forks: "false"
        allow_non_default_target_branch_deployments: ${{ inputs.allow-non-default-target-branch }}
        deployment_confirmation: ${{ inputs.deployment-confirmation }}
        deployment_confirmation_timeout: ${{ inputs.deployment-confirmation-timeout }}
        global_lock_flag: ${{ inputs.global-lock-flag }}
        sticky_locks: ${{ inputs.sticky-locks }}
        sticky_locks_for_noop: ${{ inputs.sticky-locks-for-noop }}
        use_security_warnings: ${{ inputs.use-security-warnings }}
        reaction: ${{ inputs.reaction }}

    - name: "[Trigger] Derive Operation and Rollback"
      id: derive-operation
      if: inputs.mode == 'trigger' && steps.branch-deploy.outputs.triggered == 'true'
      shell: bash
      env:
        BD_NOOP: ${{ steps.branch-deploy.outputs.noop }}
        BD_REF: ${{ steps.branch-deploy.outputs.ref }}
        STABLE_BRANCH: ${{ inputs.stable-branch }}
      run: |
        write_output() {
          local name="$1"
          local value="${2-}"
          local delimiter
          delimiter="TFBD_${name}_$(date +%s%N)_${RANDOM}"
          while [[ "$value" == *"$delimiter"* ]]; do
            delimiter="TFBD_${name}_$(date +%s%N)_${RANDOM}"
          done
          {
            printf '%s<<%s\n' "$name" "$delimiter"
            printf '%s\n' "$value"
            printf '%s\n' "$delimiter"
          } >> "$GITHUB_OUTPUT"
        }

        # Derive operation: plan, apply, or rollback
        if [[ "$BD_NOOP" == "true" ]]; then
          OPERATION="plan"
          IS_ROLLBACK="false"
        elif [[ "$BD_REF" == "$STABLE_BRANCH" ]]; then
          # Ref is stable branch = rollback (.apply main to dev)
          OPERATION="rollback"
          IS_ROLLBACK="true"
        else
          OPERATION="apply"
          IS_ROLLBACK="false"
        fi

        write_output "operation" "${OPERATION}"
        write_output "is_rollback" "${IS_ROLLBACK}"
        echo "✅ Operation: ${OPERATION}, Is Rollback: ${IS_ROLLBACK}"

    - name: "[Trigger] Export State to GITHUB_ENV"
      if: inputs.mode == 'trigger' && steps.branch-deploy.outputs.triggered == 'true'
      shell: bash
      env:
        BD_CONTINUE: ${{ steps.branch-deploy.outputs.continue }}
        BD_ENVIRONMENT: ${{ steps.branch-deploy.outputs.environment }}
        BD_SHA: ${{ steps.branch-deploy.outputs.sha }}
        BD_REF: ${{ steps.branch-deploy.outputs.ref }}
        BD_ACTOR: ${{ steps.branch-deploy.outputs.actor }}
        BD_PARAMS: ${{ steps.branch-deploy.outputs.params }}
        BD_DEPLOYMENT_ID: ${{ steps.branch-deploy.outputs.deployment_id }}
        BD_COMMENT_ID: ${{ steps.branch-deploy.outputs.comment_id }}
        BD_INITIAL_REACTION_ID: ${{ steps.branch-deploy.outputs.initial_reaction_id }}
        BD_ISSUE_NUMBER: ${{ steps.branch-deploy.outputs.issue_number }}
        BD_NOOP: ${{ steps.branch-deploy.outputs.noop }}
        BD_TYPE: ${{ steps.branch-deploy.outputs.type }}
        DERIVED_OPERATION: ${{ steps.derive-operation.outputs.operation }}
        DERIVED_IS_ROLLBACK: ${{ steps.derive-operation.outputs.is_rollback }}
      run: |
        # Write all TF_BD_* variables to GITHUB_ENV for execute mode.
        # Branch Deploy outputs include PR-controlled params, so use the
        # multiline env-file format instead of single-line echo assignments.
        write_env() {
          local name="$1"
          local value="${2-}"
          local delimiter
          delimiter="TFBD_${name}_$(date +%s%N)_${RANDOM}"
          while [[ "$value" == *"$delimiter"* ]]; do
            delimiter="TFBD_${name}_$(date +%s%N)_${RANDOM}"
          done
          {
            printf '%s<<%s\n' "$name" "$delimiter"
            printf '%s\n' "$value"
            printf '%s\n' "$delimiter"
          } >> "$GITHUB_ENV"
        }

        write_env "TF_BD_CONTINUE" "${BD_CONTINUE}"
        write_env "TF_BD_ENVIRONMENT" "${BD_ENVIRONMENT}"
        write_env "TF_BD_OPERATION" "${DERIVED_OPERATION}"
        write_env "TF_BD_IS_ROLLBACK" "${DERIVED_IS_ROLLBACK}"
        write_env "TF_BD_SHA" "${BD_SHA}"
        write_env "TF_BD_REF" "${BD_REF}"
        write_env "TF_BD_ACTOR" "${BD_ACTOR}"
        write_env "TF_BD_PR_NUMBER" "${BD_ISSUE_NUMBER}"
        write_env "TF_BD_PARAMS" "${BD_PARAMS}"
        write_env "TF_BD_DEPLOYMENT_ID" "${BD_DEPLOYMENT_ID}"
        write_env "TF_BD_COMMENT_ID" "${BD_COMMENT_ID}"
        write_env "TF_BD_INITIAL_REACTION_ID" "${BD_INITIAL_REACTION_ID}"
        write_env "TF_BD_NOOP" "${BD_NOOP}"
        write_env "TF_BD_TYPE" "${BD_TYPE}"

        echo ""
        echo "═══════════════════════════════════════════════════════════════════"
        echo "                    🚀 TRIGGER MODE COMPLETE"
        echo "═══════════════════════════════════════════════════════════════════"
        echo "Environment:  ${BD_ENVIRONMENT}"
        echo "Operation:    ${DERIVED_OPERATION}"
        echo "Is Rollback:  ${DERIVED_IS_ROLLBACK}"
        echo "Ref:          ${BD_REF}  (use this for checkout)"
        echo "SHA:          ${BD_SHA}"
        echo "═══════════════════════════════════════════════════════════════════"
        echo ""
        echo "Next steps:"
        echo "  1. Checkout: actions/checkout with ref: \${TF_BD_REF}"
        echo "  2. Configure cloud credentials using TF_BD_ENVIRONMENT"
        echo "  3. Run execute mode"

    # ╔══════════════════════════════════════════════════════════════════════════╗
    # ║                           EXECUTE MODE                                   ║
    # ║   Validate state → Hooks → Terraform → Lifecycle completion              ║
    # ╚══════════════════════════════════════════════════════════════════════════╝
    - name: "[Execute] Validate State"
      if: inputs.mode == 'execute'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        INPUT_CONFIG_PATH: ${{ inputs.config-path }}
      run: |
        ERROR_COUNT=0

        if [[ -z "${TF_BD_ENVIRONMENT}" ]]; then
          echo "::error::TF_BD_ENVIRONMENT is not set"
          ERROR_COUNT=$((ERROR_COUNT + 1))
        fi

        if [[ -z "${TF_BD_OPERATION}" ]]; then
          echo "::error::TF_BD_OPERATION is not set"
          ERROR_COUNT=$((ERROR_COUNT + 1))
        fi

        if [[ -z "${TF_BD_SHA}" ]]; then
          echo "::error::TF_BD_SHA is not set"
          ERROR_COUNT=$((ERROR_COUNT + 1))
        fi

        if [[ $ERROR_COUNT -gt 0 ]]; then
          echo ""
          echo "::error::Did you run mode: trigger first?"
          echo "::error::Execute mode requires TF_BD_* environment variables from trigger mode."
          exit 1
        fi

        # Cross-validate TF_BD_ENVIRONMENT against config file
        CONFIG_PATH="${INPUT_CONFIG_PATH}"
        if [[ ! -f "${CONFIG_PATH}" ]]; then
          echo "::error::Config file '${CONFIG_PATH}' not found in execute mode."
          echo "::error::The config file is required to validate the target environment."
          exit 1
        fi

        # Use Python + PyYAML (available in runner) for reliable YAML parsing
        python3 "${ACTION_PATH}/scripts/validate_env.py" "${CONFIG_PATH}" "${TF_BD_ENVIRONMENT}"

        echo "✅ State validated: ${TF_BD_ENVIRONMENT} / ${TF_BD_OPERATION}"

    # Declare which plan this run intends to produce BEFORE Terraform runs.
    # The intent record's name carries env/sha/params-hash/run-id, and apply
    # resolves plans only through the newest intent — so if this plan run
    # later fails, apply is blocked instead of silently falling back to an
    # older, superseded plan (the incident class where a stale targeted plan
    # was applied after a newer plan failed to persist).
    - name: "[Execute] Declare Plan Intent"
      id: declare-intent
      if: inputs.mode == 'execute' && env.TF_BD_OPERATION == 'plan'
      shell: bash
      env:
        TF_BD_EXTRA_ARGS: ${{ env.TF_BD_PARAMS }}
        INPUT_CONFIG_PATH: ${{ inputs.config-path }}
        TFBD_BIN: ${{ runner.temp }}/tf-bd-venv/bin/tf-branch-deploy
      run: |
        if [[ ! -x "$TFBD_BIN" ]]; then
          echo "::error::tf-branch-deploy command not found"
          exit 1
        fi

        "$TFBD_BIN" declare-plan-intent \
          --environment "${TF_BD_ENVIRONMENT}" \
          --sha "${TF_BD_SHA}" \
          --config "${INPUT_CONFIG_PATH}"

    # Persist the intent record before Terraform runs. If this upload fails,
    # the job stops here — planning without a recorded intent would let a
    # later apply fall back to a superseded plan.
    - name: "[Execute] Save Plan Intent"
      id: save-intent
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: inputs.mode == 'execute' && env.TF_BD_OPERATION == 'plan'
      with:
        name: ${{ steps.declare-intent.outputs.intent_artifact_name }}
        path: ${{ steps.declare-intent.outputs.intent_file }}
        if-no-files-found: error
        retention-days: ${{ inputs.plan-retention-days }}

    # Restore the saved plan for apply operations from a workflow artifact.
    # The CLI resolves the newest plan intent record (explicit numeric sort
    # by run id/attempt), then requires the EXACT plan artifact that intent
    # names. Fork-uploaded and expired artifacts are rejected; a name whose
    # embedded run id does not match its uploading run is rejected as spoofed.
    #
    # TRUST MODEL: workflow artifacts are immutable once uploaded and are
    # provenance-checked here. Apply resolves the plan only through the
    # newest intent record, so a superseded plan is never applied; a missing
    # or failed latest plan attempt aborts the apply with an actionable PR
    # comment rather than falling through to an older plan. Plan integrity is
    # further protected by the metadata sidecar checksum and params hash
    # verified in the CLI. Requires `actions: read` on the workflow token.
    - name: "[Execute] Restore Saved Plan"
      id: restore-plan
      if: inputs.mode == 'execute' && env.TF_BD_OPERATION == 'apply'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GH_REPO: ${{ github.repository }}
        INPUT_CONFIG_PATH: ${{ inputs.config-path }}
        TFBD_BIN: ${{ runner.temp }}/tf-bd-venv/bin/tf-branch-deploy
      run: |
        if [[ ! -x "$TFBD_BIN" ]]; then
          echo "::error::tf-branch-deploy command not found"
          exit 1
        fi

        "$TFBD_BIN" restore-plan \
          --environment "${TF_BD_ENVIRONMENT}" \
          --sha "${TF_BD_SHA}" \
          --config "${INPUT_CONFIG_PATH}"

    - name: "[Execute] Run Terraform"
      id: tf-execute
      if: inputs.mode == 'execute'
      shell: bash
      env:
        TFBD_GITHUB_TOKEN: ${{ inputs.github-token }}
        TF_BD_EXTRA_ARGS: ${{ env.TF_BD_PARAMS }}
        TF_BD_PLAN_ARTIFACT_NAME: ${{ steps.restore-plan.outputs.artifact_name }}
        INPUT_CONFIG_PATH: ${{ inputs.config-path }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        TFBD_BIN: ${{ runner.temp }}/tf-bd-venv/bin/tf-branch-deploy
        TFBD_TOOL_DIR: ${{ runner.temp }}/tfbd-tools/bin
      run: |
        if [[ ! -x "$TFBD_BIN" ]]; then
          echo "::error::tf-branch-deploy command not found"
          exit 1
        fi

        DRY_RUN_FLAG=""
        if [ "${INPUT_DRY_RUN}" == "true" ]; then
          DRY_RUN_FLAG="--dry-run"
        fi

        export PATH="${TFBD_TOOL_DIR}:${PATH}"

        "$TFBD_BIN" execute \
          --environment "${TF_BD_ENVIRONMENT}" \
          --operation "${TF_BD_OPERATION}" \
          --sha "${TF_BD_SHA}" \
          --config "${INPUT_CONFIG_PATH}" \
          $DRY_RUN_FLAG

    # Upload the plan and metadata sidecar as an immutable workflow artifact
    # only after the CLI has saved the metadata sidecar. The artifact name
    # includes the params hash emitted by the CLI so apply can prove the
    # restored plan matches the Terraform arguments used for planning.
    # An upload failure fails this step loudly (if-no-files-found: error);
    # the lifecycle step below then reports the failure on the PR — a plan
    # that cannot be persisted must never look successful.
    - name: "[Execute] Save Plan Artifact"
      id: save-plan
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: inputs.mode == 'execute' && env.TF_BD_OPERATION == 'plan' && steps.tf-execute.outputs.plan_params_hash != ''
      with:
        name: tfplan-${{ env.TF_BD_ENVIRONMENT }}-${{ env.TF_BD_SHA }}-${{ steps.declare-intent.outputs.params_hash }}-${{ github.run_id }}-${{ github.run_attempt }}
        path: |
          **/tfplan-${{ env.TF_BD_ENVIRONMENT }}-*.tfplan
          **/tfplan-${{ env.TF_BD_ENVIRONMENT }}-*.meta.json
        if-no-files-found: error
        retention-days: ${{ inputs.plan-retention-days }}

    - name: "[Execute] Complete Deployment Lifecycle"
      if: inputs.mode == 'execute' && always()
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GH_REPO: ${{ github.repository }}
        STATUS: ${{ steps.tf-execute.outcome }}
        FAILURE_REASON: ${{ steps.tf-execute.outputs.failure_reason }}
        SAVE_PLAN_OUTCOME: ${{ steps.save-plan.outcome }}
        SAVE_INTENT_OUTCOME: ${{ steps.save-intent.outcome }}
        DECLARE_INTENT_FAILURE_REASON: ${{ steps.declare-intent.outputs.failure_reason }}
        RESTORE_FAILURE_REASON: ${{ steps.restore-plan.outputs.failure_reason }}
        TFBD_BIN: ${{ runner.temp }}/tf-bd-venv/bin/tf-branch-deploy
      run: |
        # A plan run only succeeds if Terraform succeeded AND the plan was
        # persisted as an artifact — a plan that cannot be applied later must
        # be reported as a failure, never silently accepted.
        if [[ "${STATUS}" == "success" && "${SAVE_PLAN_OUTCOME}" != "failure" ]]; then
          FINAL_STATUS="success"
        else
          FINAL_STATUS="failure"
        fi

        if [[ -z "${FAILURE_REASON}" && "${SAVE_PLAN_OUTCOME}" == "failure" ]]; then
          FAILURE_REASON="Terraform plan succeeded, but the plan file could not be uploaded as a workflow artifact, so a later apply would not find it. Check the workflow logs for the upload error, then run the plan again."
        fi
        if [[ -z "${FAILURE_REASON}" && -n "${DECLARE_INTENT_FAILURE_REASON}" ]]; then
          FAILURE_REASON="${DECLARE_INTENT_FAILURE_REASON}"
        fi
        if [[ -z "${FAILURE_REASON}" && "${SAVE_INTENT_OUTCOME}" == "failure" ]]; then
          FAILURE_REASON="The plan intent record could not be uploaded as a workflow artifact, so planning stopped before Terraform ran. Check the workflow logs for the upload error, then run the plan again."
        fi
        if [[ -z "${FAILURE_REASON}" && -n "${RESTORE_FAILURE_REASON}" ]]; then
          FAILURE_REASON="${RESTORE_FAILURE_REASON}"
        fi

        "$TFBD_BIN" complete-lifecycle \
          --status "${FINAL_STATUS}" \
          --failure-reason "${FAILURE_REASON}"
