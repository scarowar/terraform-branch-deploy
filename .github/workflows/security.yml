name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "20 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-security:
    if: >
      github.event_name != 'pull_request' ||
      github.actor != 'pre-commit-ci[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Audit Python dependencies
        run: |
          uv export --quiet --frozen --all-groups --no-emit-project --no-editable --no-hashes --output-file /tmp/tfbd-pip-audit-requirements.txt
          uv run pip-audit --strict -r /tmp/tfbd-pip-audit-requirements.txt

      - name: Scan Python security issues
        run: uv run bandit -r src

      - name: Scan workflows with zizmor
        run: uv run zizmor --offline .

      - name: Scan source with Semgrep
        run: uv run semgrep scan --config .semgrep.yml --error --metrics=off --disable-version-check .

      - name: Run secret and workflow linters
        run: |
          uv run pre-commit run gitleaks --all-files
          uv run pre-commit run actionlint --all-files

      - name: Generate SBOM
        run: |
          mkdir -p sbom
          uv run cyclonedx-py environment .venv --output-reproducible --of JSON -o sbom/cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cyclonedx-sbom
          path: sbom/cyclonedx.json
          retention-days: 14
